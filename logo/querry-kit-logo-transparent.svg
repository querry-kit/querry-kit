<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g" x1="220" y1="180" x2="820" y2="850" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#7C5CFC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000000" flood-opacity=".30"/>
    </filter>
  </defs>

  

  <g filter="url(#shadow)">
    <!-- Main query ring / Q -->
    <circle cx="500" cy="470" r="278" fill="none" stroke="url(#g)" stroke-width="96"/>
    <path d="M675 680 L830 835" fill="none" stroke="url(#g)" stroke-width="96"
          stroke-linecap="round"/>

    <!-- Nested field/query nodes -->
    <path d="M330 365 H470" fill="none" stroke="#F8FAFC" stroke-width="46" stroke-linecap="round"/>
    <path d="M330 470 H590" fill="none" stroke="#F8FAFC" stroke-width="46" stroke-linecap="round"/>
    <path d="M330 575 H520" fill="none" stroke="#F8FAFC" stroke-width="46" stroke-linecap="round"/>

    <circle cx="630" cy="365" r="35" fill="#22D3EE"/>
    <circle cx="690" cy="470" r="35" fill="#A5B4FC"/>
    <circle cx="600" cy="575" r="35" fill="#7C5CFC"/>

    <!-- connector lines -->
    <path d="M470 365 H595" stroke="#F8FAFC" stroke-width="22" stroke-linecap="round" opacity=".85"/>
    <path d="M590 470 H655" stroke="#F8FAFC" stroke-width="22" stroke-linecap="round" opacity=".85"/>
    <path d="M520 575 H565" stroke="#F8FAFC" stroke-width="22" stroke-linecap="round" opacity=".85"/>
  </g>
</svg>